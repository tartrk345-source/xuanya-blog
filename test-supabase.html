<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Supabase 读取测试</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    pre { background: #fff; padding: 15px; border-radius: 8px; overflow: auto; max-height: 500px; }
    .error { color: #e53e3e; }
    .success { color: #38a169; }
  </style>
</head>
<body>
  <h1>Supabase 文章读取测试</h1>
  <button onclick="testRead()">测试读取文章</button>
  <button onclick="testCategories()">测试读取分类</button>
  <div id="result"></div>

  <script>
    const supabaseUrl = 'https://twuvrrfzlynhehdxxtid.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dXZycmZ6bHluaGVoZHh4dGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzg3MzUsImV4cCI6MjA5Njg1NDczNX0.-fPpl84I9IHuT-eAfkMJ6KqLXmeRKO08BDpy1mb7P7o';

    // 使用 UMD 全局变量
    const { createClient } = supabase;
    const client = createClient(supabaseUrl, supabaseKey, {
      auth: { persistSession: false }
    });

    async function testRead() {
      const el = document.getElementById('result');
      el.innerHTML = '<p>正在读取...</p>';

      try {
        const { data, error } = await client
          .from('articles')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        el.innerHTML = `
          <p class="success">✅ 读取成功！共 ${data.length} 篇文章</p>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
      } catch (err) {
        el.innerHTML = `<p class="error">❌ 读取失败: ${err.message}</p>`;
      }
    }

    async function testCategories() {
      const el = document.getElementById('result');
      el.innerHTML = '<p>正在读取...</p>';

      try {
        const { data, error } = await client
          .from('categories')
          .select('*');

        if (error) throw error;

        el.innerHTML = `
          <p class="success">✅ 读取成功！共 ${data.length} 个分类</p>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
      } catch (err) {
        el.innerHTML = `<p class="error">❌ 读取失败: ${err.message}</p>`;
      }
    }
  </script>
</body>
</html>
