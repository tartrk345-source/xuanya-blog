<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 底色：深靛蓝圆角方形，呼应学术风格 -->
  <rect width="48" height="48" rx="10" fill="#4F46E5"/>
  <!-- 内圈：浅色光环，代表"个人世界" -->
  <circle cx="24" cy="24" r="14" stroke="#A5B4FC" stroke-width="2.5" fill="none" opacity="0.7"/>
  <!-- 中心点 / 星芒 -->
  <circle cx="24" cy="24" r="4" fill="#C7D2FE"/>
  <!-- 四方向短线，象征"玄"的字形意象 -->
  <line x1="24" y1="9" x2="24" y2="15" stroke="#A5B4FC" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="33" x2="24" y2="39" stroke="#A5B4FC" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="9" y1="24" x2="15" y2="24" stroke="#A5B4FC" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="33" y1="24" x2="39" y2="24" stroke="#A5B4FC" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
